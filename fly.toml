app = "group-scheduler"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  DATA_DIR = "/data"

[[mounts]]
  source = "scheduler_data"
  destination = "/data"

[http_service]
  auto_start_machines = true
  auto_stop_machines = true
  force_https = true
  internal_port = 3000
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpus = 1
  memory = "1gb"
  memory_mb = 1024
